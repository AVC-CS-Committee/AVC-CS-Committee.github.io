<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <title>{{title}}</title>
</head>
<body>
    <!-- Used to create left + right padding for background -->
    <div class="bigBox">
        <!-- This is the main content area, excluding navbars and sidebars and such -->
        <div class="left">
            <div class="panel">
                <h1 class="title">Here's a title</h1>
                <h1>This is a header</h1>
                <h2>Here's a smaller header</h2>
                <p>This is some text</p>
                <h2>Another header</h2>
                <p>Text with <em>various</em> <b>different</b> <u>styles</u>.</p>
            </div>
            <div class="panel">
                <h1>This is another box</h1>
                <p>Here we go</p>
            </div>
        </div>
        <!-- This holds the navbar -->
        <div id="navBox">
            <ul>
                <li>
                    <a href="#">link</a>
                </li>
                <li>
                    <a href="#">link</a>
                </li>
                <li>
                    <a href="#">link</a>
                </li>
                <li>
                    <a href="#">link</a>
                </li>
            </ul>

        </div>
    </div>
</body>
</html>
